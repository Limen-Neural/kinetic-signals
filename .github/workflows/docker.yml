name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: kinetic-signals:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests inside container
        run: docker run --rm kinetic-signals:test cargo test --all-features

      - name: Verify build with sentry feature
        run: docker run --rm kinetic-signals:test cargo check --features sentry