name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: kinetic-signals:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and test in Docker (builder stage)
        run: |
          docker build --target builder -t kinetic-signals:builder .
          docker run --rm kinetic-signals:builder cargo test --all-features
          docker run --rm kinetic-signals:builder cargo check --features sentry