name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: kinetic-signals:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and test in Docker (builder stage)
        run: |
          docker build --target builder -t kinetic-signals:builder .
          docker run --rm kinetic-signals:builder cargo test --all-features
          docker run --rm kinetic-signals:builder cargo check --features sentry