# https://docs.devin.ai/onboard-devin/environment-yaml
# Devin environment blueprint for kinetic-signals
# Commands run from the repo root.
initialize: |
  curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.97 --component clippy,rustfmt
  echo "PATH=$HOME/.cargo/bin:$PATH" >> "$ENVRC"
  sudo apt-get update
  sudo apt-get install -y pkg-config libssl-dev libclang-dev

maintenance: |
  cargo fetch

knowledge:
  - name: lint
    contents: |
      cargo clippy --all-targets --all-features -- -D warnings
  - name: test
    contents: |
      cargo test --all-features
  - name: build
    contents: |
      cargo build --all-features
  - name: format
    contents: |
      cargo fmt --check
